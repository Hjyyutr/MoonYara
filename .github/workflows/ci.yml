name: Test

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Moon env (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libssl-dev
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Setup Moon env (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gcc openssl
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Setup Moon env (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          echo "$HOME/.moon/bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Setup MSYS2 + MinGW + openssl (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-openssl

      - name: Create Moon Wrapper
        run: |
          mkdir -p "$HOME/.bin"
          cat << 'EOF' > "$HOME/.bin/moon"
          #!/bin/bash
          if [ -f "$HOME/.moon/bin/moon.exe" ]; then
            REAL_MOON="$HOME/.moon/bin/moon.exe"
          else
            REAL_MOON="$HOME/.moon/bin/moon"
          fi

          cmd="$1"
          shift

          args=()
          if [ "$cmd" = "fmt" ]; then
            has_check=0
            for arg in "$@"; do
              if [ "$arg" = "--deny-warn" ] || [ "$arg" = "-d" ]; then
                continue
              fi
              if [ "$arg" = "--check" ]; then
                has_check=1
              fi
              args+=("$arg")
            done
            if [ $has_check -eq 0 ]; then
              args+=("--check")
            fi
            exec "$REAL_MOON" fmt "${args[@]}"
          elif [ "$cmd" = "info" ]; then
            for arg in "$@"; do
              if [ "$arg" = "--deny-warn" ] || [ "$arg" = "-d" ]; then
                continue
              fi
              args+=("$arg")
            done
            exec "$REAL_MOON" info "${args[@]}"
          else
            exec "$REAL_MOON" "$cmd" "$@"
          fi
          EOF
          chmod +x "$HOME/.bin/moon"
          echo "$HOME/.bin" >> "$GITHUB_PATH"

      - name: Moon Check
        run: |
          moon fmt --deny-warn
          moon check --deny-warn
          moon info --deny-warn
          git diff --exit-code
          git status

      - name: Moon test
        run: |
          echo moon test
          moon test --deny-warn --enable-coverage
          moon coverage report -f summary

          moon coverage analyze

          # ffi test
          echo moon test native
          moon test --deny-warn --target native --enable-coverage
          moon coverage report -f summary

          moon coverage analyze
